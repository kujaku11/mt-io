name: Testing

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
jobs:
  setup-build:
    name: Ex1 (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - uses: actions/checkout@v4
    - uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}

    - name: Install Env
      run: |
        python --version
        conda install pytest
        conda install pytest-cov
        conda install pytest-subtests
        conda install pytest-xdist[psutil]
        conda install pytest-benchmark
        conda install setuptools
        pip install mt_metadata[obspy]
        pip install git+https://github.com/kujaku11/mth5_test_data.git
    - name: Install Our Package
      run: |
        pip install -e .
        conda list

    - name: Run Tests
      run: pytest -vv --cov=./ --cov-report=xml --cov=mth5 -n auto tests -k "not slow"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        flags: tests
        fail_ci_if_error: false
        verbose: true
